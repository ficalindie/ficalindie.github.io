<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FICALINDIE FEST</title>
  <link rel="shortcut icon" type="image/x-icon" href="media/favicon.png">
  <style>
    @font-face {
      font-family: 'Lovelo Black';
      src: url('font/lovelo_black.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }
    * { margin:0; padding:0; box-sizing:border-box; touch-action:manipulation; }
    html, body { width:100%; height:100%; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      cursor: default;
      background: #000;
    }
    .container {
      text-align: center;
      position: relative;
      padding: 2rem;
      transition: transform 0.3s ease;
      perspective: 1000px;
      transform-style: preserve-3d;
    }

    .title, .coming-soon {
      font-family: 'Lovelo Black', sans-serif;
      transition: all 0.4s cubic-bezier(0.23,1,0.32,1);
      transform-style: preserve-3d;
    }
    .title {
      font-size: clamp(2.5rem, 8vw, 4rem);
      color: white;
      text-transform: uppercase;
      letter-spacing: -2px;
      margin-bottom: 2rem;
      text-shadow: 3px 3px 0 rgba(0,0,0,0.1);
      position: relative;
    }
    .title-logo {
      position: absolute;
      width: clamp(60px, 15vw, 120px);
      height: clamp(60px, 15vw, 120px);
      background: url('media/icone/logo_ficalindie.png') center/contain no-repeat;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
      z-index: 2;
    }
    .coming-soon {
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      color: #fff;
      margin: 2rem 0;
      display: inline-block;
      /* animation: float 3s ease-in-out infinite; */  /* ← disabled */
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    .container {
    text-align: center;
    position: relative;
    padding: 1rem;
    max-width: 95%;
    margin: 0 auto;
  }

  .title {
    font-size: clamp(2rem, 6vw, 3.5rem);
    line-height: 1.2;
    margin-bottom: 1rem;
  }

  .coming-soon {
    font-size: clamp(1rem, 4vw, 2rem);
    line-height: 1.3;
    max-width: 90%;
    margin: 1rem auto;
  }

  @media (max-width: 480px) {
    .container {
      padding: 0.5rem;
    }
    .title {
      letter-spacing: -1px;
    }
  }




    .logo-trail {
      position: absolute;
      width: clamp(30px, 10vw, 60px);
      height: clamp(30px, 10vw, 60px);
      background: url('media/logo.png') center/contain no-repeat;
      pointer-events: none;
      opacity: 0;
      animation: trailFloat 1.5s ease-out forwards;
      mix-blend-mode: overlay;
      z-index: 1;
    }
    /* @keyframes float {
      0%,100% { transform: translateY(0) rotate(1deg); }
      50%    { transform: translateY(-15px) rotate(-1deg); }
    } */
    @keyframes trailFloat {
      0% {
        opacity: 0.8;
        transform: translate(-50%,-50%) scale(0.8);
      }
      100% {
        opacity: 0;
        transform:
          translate(
            calc(-50% + (var(--rand-x)*200px)),
            calc(-50% + (var(--rand-y)*200px))
          ) scale(2) rotate(360deg);
        filter: hue-rotate(180deg);
      }
    }
    @media (hover:none) {
      body { cursor: pointer; }
    }
    .char-span {
      display: inline-block;
      transform-origin: center;
      white-space: pre;
    }
    .site-footer {
      position: fixed;
      bottom: 3.5rem;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 5;
    }
    .social-links {
      display: flex;
      justify-content: center;
      gap: 1.8rem;
      margin-bottom: 0.6rem;
    }
    .social-link {
      display: inline-block;
      color: #fff;
      cursor: pointer;
      transition: opacity 0.3s ease;
    }
    .social-link:hover { opacity: 0.7; }
    .social-link .icon {
      width: 32px;
      height: 32px;
      display: block;
    }
    .social-link svg.icon { fill: #fff; }
    .social-link img.icon { filter: invert(1); }
    .seele-credit {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-family: 'Lovelo Black', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 1px;
      opacity: 0.6;
      color: #fff;
    }
    .seele-credit img {
      width: 30px;
      height: auto;
      filter: invert(1);
    }

    /* Confetti pieces */
    .nav-button {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      color: #fff;
      cursor: pointer;
      font-family: 'Lovelo Black', sans-serif;
      perspective: 600px;
      margin-top: 1rem;
    }
    .nav-button img {
      width: clamp(70px, 12vw, 120px);
      height: auto;
      display: block;
      transition: transform 0.4s cubic-bezier(0.23,1,0.32,1);
      transform-origin: center;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
    }
    .nav-button:hover img {
      transform: rotate(-6deg) scale(1.05);
    }
    .nav-button span {
      margin-top: 0.6rem;
      font-size: clamp(0.9rem, 2.5vw, 1.2rem);
      letter-spacing: 2px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }


  </style>
</head>
<body>

<div class="container">
    <div class="title-logo"></div>
    <h1 class="title">FICALINDIE FEST</h1>
    <a class="nav-button" href="edizioni.html">
      <img src="media/pulsanti/button_poster.png" alt="Edizioni">
      <span>EDIZIONI</span>
    </a>
  </div>


<footer class="site-footer">
    <div class="social-links">
      <a class="social-link" href="https://instagram.com/ficalindie" target="_blank" rel="noopener">
        <img class="icon" src="media/icone/logo_instagram_nero.png" alt="IG">
      </a>
      <a class="social-link" href="https://t.me/ficalindiefest" target="_blank" rel="noopener">
        <img class="icon" src="media/icone/logo_tg_nero.png" alt="Telegram">
      </a>
      <a class="social-link" href="https://www.youtube.com/@ficalindie" target="_blank" rel="noopener">
        <img class="icon" src="media/icone/logo_yt_nero.png" alt="Youtube">
      </a>
      <a class="social-link" href="mailto:seeleaps@gmail.com">
        <img class="icon" src="media/icone/logo_mail_nero.png" alt="Email">
      </a>
    </div>
    <div class="seele-credit">
      <img src="media/icone/logo_seele_nero.png" alt="SEELE APS">
      <span>by SEELE APS</span>
    </div>
  </footer>

  <script>
    // Simple character wrapping for title
    document.querySelectorAll('.title').forEach(el => {
      const txt = el.textContent;
      el.textContent = '';
      for (let c of txt) {
        const span = document.createElement('span');
        span.className = 'char-span';
        span.textContent = c;
        el.appendChild(span);
      }
    });
  </script>
</body>
</html>
