<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FICALINDIE FEST</title>
  <link rel="shortcut icon" type="image/x-icon" href="media/icone/favicon.png">
  <style>
    @font-face {
      font-family: 'Lovelo Black';
      src: url('font/lovelo_black.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }
    * { margin:0; padding:0; box-sizing:border-box; touch-action:manipulation; }
    html, body { width:100%; height:100%; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      cursor: default;
      background: #000;
    }
    .container {
      text-align: center;
      position: relative;
      padding: 1rem;
      max-width: 95%;
      margin: 0 auto;
      transition: transform 0.3s ease;
      perspective: 1000px;
      transform-style: preserve-3d;
    }

    .title, .coming-soon {
      font-family: 'Lovelo Black', sans-serif;
      transition: all 0.4s cubic-bezier(0.23,1,0.32,1);
      transform-style: preserve-3d;
    }
    .title {
      font-size: clamp(2rem, 6vw, 3.5rem);
      color: white;
      text-transform: uppercase;
      letter-spacing: -2px;
      line-height: 1.2;
      margin-bottom: 1rem;
      text-shadow: 3px 3px 0 rgba(0,0,0,0.1);
      position: relative;
    }
    .title-logo {
      position: absolute;
      width: clamp(60px, 15vw, 120px);
      height: clamp(60px, 15vw, 120px);
      background: url('media/icone/logo_ficalindie.png') center/contain no-repeat;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
      z-index: 2;
    }

    @media (max-width: 480px) {
      .container { padding: 0.5rem; }
      .title { letter-spacing: -1px; }
    }

    .logo-trail {
      position: absolute;
      width: clamp(30px, 10vw, 60px);
      height: clamp(30px, 10vw, 60px);
      background: url('media/icone/logo_ficalindie.png') center/contain no-repeat;
      pointer-events: none;
      opacity: 0;
      animation: trailFloat 1.5s ease-out forwards;
      mix-blend-mode: overlay;
      z-index: 1;
    }
    @keyframes trailFloat {
      0% {
        opacity: 0.8;
        transform: translate(-50%,-50%) scale(0.8);
      }
      100% {
        opacity: 0;
        transform:
          translate(
            calc(-50% + (var(--rand-x)*200px)),
            calc(-50% + (var(--rand-y)*200px))
          ) scale(2) rotate(360deg);
        filter: hue-rotate(180deg);
      }
    }
    @media (hover:none) {
      body { cursor: pointer; }
    }
    .char-span {
      display: inline-block;
      transform-origin: center;
      white-space: pre;
    }
    .site-footer {
      position: fixed;
      bottom: 3.5rem;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 5;
    }
    .social-links {
      display: flex;
      justify-content: center;
      gap: 1.8rem;
      margin-bottom: 0.6rem;
    }
    .social-link {
      position: relative;
      display: inline-block;
      color: #fff;
      cursor: pointer;
      transition: opacity 0.3s ease;
    }
    .social-link:hover { opacity: 0.7; }
    .social-link .icon {
      width: 32px;
      height: 32px;
      display: block;
      transition: transform 0.3s ease;
      transform-origin: center center;
    }
    .social-link svg.icon { fill: #fff; }
    .social-link img.icon { filter: invert(1); }
    .seele-credit {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-family: 'Lovelo Black', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 1px;
      opacity: 0.6;
      color: #fff;
    }
    .seele-credit img {
      width: 39px;
      height: auto;
      filter: invert(1);
    }

    /* Nav button */
    .nav-button {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      color: #fff;
      cursor: pointer;
      font-family: 'Lovelo Black', sans-serif;
      perspective: 600px;
      margin-top: 1rem;
    }
    .nav-button img {
      width: clamp(70px, 12vw, 120px);
      height: auto;
      display: block;
      transition: transform 0.4s cubic-bezier(0.23,1,0.32,1);
      transform-origin: center;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
    }
    .nav-button:hover img {
      transform: rotate(-6deg) scale(1.05);
    }
    .nav-button span {
      margin-top: 0.6rem;
      font-size: clamp(0.9rem, 2.5vw, 1.2rem);
      letter-spacing: 2px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    /* Freaky Mode toggle */
    .freaky-toggle {
      position: fixed;
      top: 1.2rem;
      right: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      font-family: 'Lovelo Black', sans-serif;
      color: #fff;
      font-size: 0.85rem;
      letter-spacing: 2px;
      z-index: 50;
      user-select: none;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
    }
    .freaky-toggle input { display: none; }
    .freaky-toggle .switch {
      position: relative;
      width: 46px; height: 24px;
      background: rgba(255,255,255,0.25);
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    .freaky-toggle .switch::after {
      content: '';
      position: absolute;
      top: 2px; left: 2px;
      width: 18px; height: 18px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.3s ease;
    }
    .freaky-toggle input:checked + .switch { background: #b57c00; }
    .freaky-toggle input:checked + .switch::after { transform: translateX(22px); }

    /* ===== CITTU toggle ===== */
    .cittu-toggle {
      position: fixed;
      top: 3rem;
      right: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      font-family: 'Lovelo Black', sans-serif;
      color: #fff;
      font-size: 0.85rem;
      letter-spacing: 2px;
      z-index: 50;
      user-select: none;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .cittu-toggle.visible { opacity: 1; pointer-events: auto; }
    .cittu-toggle input { display: none; }
    .cittu-toggle .switch {
      position: relative;
      width: 46px; height: 24px;
      background: rgba(255,255,255,0.25);
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    .cittu-toggle .switch::after {
      content: '';
      position: absolute;
      top: 2px; left: 2px;
      width: 18px; height: 18px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.3s ease;
    }
    .cittu-toggle input:checked + .switch { background: #b57c00; }
    .cittu-toggle input:checked + .switch::after { transform: translateX(22px); }

    /* Social inflate animation (freaky mode) */
    .social-link.inflating .icon {
      animation: inflate 2s ease-in forwards;
    }
    @keyframes inflate {
      0%   { transform: scale(1); }
      80%  { transform: scale(2.5); }
      100% { transform: scale(3); }
    }

    /* Confetti pieces */
    .confetti {
      position: absolute;
      width: 6px; height: 6px;
      background: red;
      opacity: 0;
      pointer-events: none;
      animation: confettiPop 1s ease-out forwards;
    }
    @keyframes confettiPop {
      0%   { opacity: 1; transform: translate(0,0) scale(1); }
      100% { opacity: 0; transform: translate(var(--dx), var(--dy)) rotate(var(--rot)) scale(0.5); }
    }
  </style>
</head>
<body>

  <!-- SVG displacement filter for water ripple -->
  <svg width="0" height="0" style="position:absolute">
    <filter id="displacementFilter" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0 0" numOctaves="1" result="turb"/>
      <feDisplacementMap in="SourceGraphic" in2="turb" scale="0" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </svg>

  <div class="container">
    <div class="title-logo"></div>
    <h1 class="title">FICALINDIE FEST</h1>
    <a class="nav-button" href="museo.html">
      <img src="media/pulsanti/button_poster.png" alt="Museo">
      <span>MUSEO</span>
    </a>
  </div>

  <footer class="site-footer">
    <div class="social-links">
      <a class="social-link" href="https://instagram.com/ficalindie" target="_blank" rel="noopener">
        <img class="icon" src="media/icone/logo_instagram_nero.png" alt="IG">
      </a>
      <a class="social-link" href="https://t.me/ficalindiefest" target="_blank" rel="noopener">
        <img class="icon" src="media/icone/logo_tg_nero.png" alt="Telegram">
      </a>
      <a class="social-link" href="https://www.youtube.com/@ficalindie" target="_blank" rel="noopener">
        <img class="icon" src="media/icone/logo_yt_nero.png" alt="Youtube">
      </a>
      <a class="social-link" href="mailto:seeleaps@gmail.com">
        <img class="icon" src="media/icone/logo_mail_nero.png" alt="Email">
      </a>
    </div>
    <div class="seele-credit">
      <img src="media/icone/logo_seele_nero.png" alt="SEELE APS">
      <span>by SEELE APS</span>
    </div>
  </footer>

  <label class="freaky-toggle">
    <span>FREAKY MODE</span>
    <input type="checkbox" id="freakyToggle">
    <span class="switch"></span>
  </label>

  <label class="cittu-toggle" id="cittuToggle">
    <span>CITTU</span>
    <input type="checkbox" id="cittuInput">
    <span class="switch"></span>
  </label>

  <script>
    // ===== Freaky Mode =====
    let freakyMode = false;
    const freakyInput = document.getElementById('freakyToggle');
    let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
    const color1 = '#7300b5', color2 = '#b57c00';
    const containerEl = document.querySelector('.container');

    // SVG filter refs for water ripple
    const turb = document.querySelector('feTurbulence');
    const disp = document.querySelector('feDisplacementMap');
    const DECAY = 0.99, SCALE_FACTOR = 60, FREQUENCY_MULT = 0.03, MIN_VELOCITY = 0.0001;
    let lastX = 0, lastY = 0, lastT = performance.now(), velocity = 0;

    // ===== Audio (Web Audio API) =====
    // ===== Audio (HTML Audio element) =====
    const hoverAudio = new Audio('media/suoni/hover.flac');
    hoverAudio.loop = true;
    hoverAudio.volume = 0;
    let soundPlaying = false;
    let moveTimeout;
    let fadeInterval;

    function startHoverSound() {
      if (soundPlaying) return;
      soundPlaying = true;
      clearInterval(fadeInterval);
      hoverAudio.currentTime = 0;
      hoverAudio.play().catch(() => {});
      // Fade in
      fadeInterval = setInterval(() => {
        if (hoverAudio.volume < 0.45) {
          hoverAudio.volume = Math.min(0.5, hoverAudio.volume + 0.05);
        } else {
          clearInterval(fadeInterval);
        }
      }, 20);
    }

    function fadeOutHoverSound() {
      if (!soundPlaying) return;
      clearInterval(fadeInterval);
      // Fade out quickly
      fadeInterval = setInterval(() => {
        if (hoverAudio.volume > 0.05) {
          hoverAudio.volume = Math.max(0, hoverAudio.volume - 0.05);
        } else {
          hoverAudio.volume = 0;
          hoverAudio.pause();
          soundPlaying = false;
          clearInterval(fadeInterval);
        }
      }, 20);
    }

    function playPopSound() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.connect(g);
        g.connect(ctx.destination);
        osc.frequency.setValueAtTime(300, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.15);
        g.gain.setValueAtTime(0.4, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
        osc.start();
        osc.stop(ctx.currentTime + 0.2);
      } catch(e) {}
    }

    // ===== CITTU toggle =====
    let cittuMode = false;
    const cittuToggle = document.getElementById('cittuToggle');
    const cittuInput = document.getElementById('cittuInput');

    function setCittu(on) {
      cittuMode = on;
      localStorage.setItem('cittuMode', on ? '1' : '0');
      if (on) {
        fadeOutHoverSound();
      }
    }
    cittuInput.addEventListener('change', e => setCittu(e.target.checked));

    // ===== Toggle freaky mode =====
    function setFreaky(on) {
      freakyMode = on;
      localStorage.setItem('freakyMode', on ? '1' : '0');
      if (on) {
        containerEl.style.filter = 'url(#displacementFilter)';
        cittuToggle.classList.add('visible');
      } else {
        document.body.style.background = '#000';
        containerEl.style.filter = '';
        containerEl.style.transform = '';
        turb.setAttribute('baseFrequency', '0 0');
        disp.setAttribute('scale', '0');
        velocity = 0;
        cittuToggle.classList.remove('visible');
        cittuInput.checked = false;
        cittuMode = false;
        localStorage.setItem('cittuMode', '0');
        fadeOutHoverSound();
      }
    }

    freakyInput.addEventListener('change', e => setFreaky(e.target.checked));
    if (localStorage.getItem('freakyMode') === '1') {
      freakyInput.checked = true;
      setFreaky(true);
      if (localStorage.getItem('cittuMode') === '1') {
        cittuInput.checked = true;
        cittuMode = true;
      }
    }

    // ===== Interaction handler =====
    function handleInteraction(e) {
      const x = e.clientX ?? e.touches?.[0]?.clientX;
      const y = e.clientY ?? e.touches?.[0]?.clientY;
      if (x == null || y == null) return;
      mouseX = x; mouseY = y;
      if (!freakyMode) return;

      // Logo trail
      if (Math.random() < 0.3) {
        const trail = document.createElement('div');
        trail.className = 'logo-trail';
        trail.style.setProperty('--rand-x', (Math.random() - 0.5) * 2);
        trail.style.setProperty('--rand-y', (Math.random() - 0.5) * 2);
        trail.style.left = x + 'px';
        trail.style.top = y + 'px';
        trail.style.filter = 'hue-rotate(' + (Math.random() * 360) + 'deg)';
        document.body.appendChild(trail);
        setTimeout(() => trail.remove(), 1500);
      }

      // 3D tilt
      const cx = innerWidth / 2, cy = innerHeight / 2;
      const tiltY = (cx - x) / 20, tiltX = (cy - y) / 20;
      containerEl.style.transform =
        'perspective(1000px) rotateY(' + tiltY + 'deg) rotateX(' + tiltX + 'deg)';

      // Velocity for water ripple
      const now = performance.now();
      const dx = x - lastX, dy = y - lastY;
      const dt = Math.max(16, now - lastT);
      velocity = Math.sqrt(dx * dx + dy * dy) / dt;
      lastX = x; lastY = y; lastT = now;

      if (velocity > MIN_VELOCITY) {
        const bf = velocity * FREQUENCY_MULT;
        const scale = velocity * SCALE_FACTOR;
        turb.setAttribute('baseFrequency', bf + ' ' + bf);
        disp.setAttribute('scale', scale);
      }

      // Hover sound
      if (!cittuMode) {
        startHoverSound();
        clearTimeout(moveTimeout);
        moveTimeout = setTimeout(fadeOutHoverSound, 200);
      }
    }

    document.addEventListener('mousemove', handleInteraction);
    document.addEventListener('touchmove', handleInteraction, { passive: true });
    document.addEventListener('touchend', () => {
      containerEl.style.transform = 'perspective(1000px) rotateY(0) rotateX(0)';
    });

    // ===== Animation loop: ripple decay + background gradient =====
    (function animLoop() {
      if (freakyMode) {
        // Decay ripple
        velocity *= DECAY;
        if (velocity > MIN_VELOCITY) {
          const bf = velocity * FREQUENCY_MULT;
          const scale = velocity * SCALE_FACTOR;
          turb.setAttribute('baseFrequency', bf + ' ' + bf);
          disp.setAttribute('scale', scale);
        } else {
          turb.setAttribute('baseFrequency', '0 0');
          disp.setAttribute('scale', '0');
        }
        // Background gradient
        const px = (mouseX / window.innerWidth) * 100;
        const py = (mouseY / window.innerHeight) * 100;
        document.body.style.background =
          'radial-gradient(circle at ' + px + '% ' + py + '%, ' + color1 + ', ' + color2 + ')';
      }
      requestAnimationFrame(animLoop);
    })();

    // ===== Social icon inflate/pop (freaky mode) =====
    document.querySelectorAll('.social-link').forEach(link => {
      let inflateTimer;

      function startInflate() {
        if (!freakyMode) return;
        link.classList.add('inflating');
        inflateTimer = setTimeout(() => triggerPop(link), 2000);
      }
      function cancelInflate() {
        clearTimeout(inflateTimer);
        link.classList.remove('inflating');
        const icon = link.querySelector('.icon');
        if (icon) icon.style.transform = '';
      }

      link.addEventListener('mouseenter', startInflate);
      link.addEventListener('mouseleave', cancelInflate);
      link.addEventListener('touchstart', startInflate, { passive: true });
      link.addEventListener('touchend', cancelInflate);
    });

    function triggerPop(link) {
      const icon = link.querySelector('.icon');
      icon.style.display = 'none';
      playPopSound();
      createConfetti(link);
      setTimeout(() => {
        link.querySelectorAll('.confetti').forEach(node => node.remove());
        icon.style.display = '';
        icon.style.transform = '';
        link.classList.remove('inflating');
      }, 1000);
    }

    function createConfetti(link) {
      for (let i = 0; i < 30; i++) {
        const piece = document.createElement('div');
        piece.classList.add('confetti');
        piece.style.setProperty('--dx', (Math.random() - 0.5) * 200 + 'px');
        piece.style.setProperty('--dy', (Math.random() - 1) * 200 + 'px');
        piece.style.setProperty('--rot', Math.random() * 720 + 'deg');
        piece.style.background = 'hsl(' + (Math.random() * 360) + ', 70%, 60%)';
        piece.style.left = '50%';
        piece.style.top = '50%';
        link.appendChild(piece);
      }
    }

    // ===== Character wrapping for title =====
    document.querySelectorAll('.title').forEach(el => {
      const txt = el.textContent;
      el.textContent = '';
      for (let c of txt) {
        const span = document.createElement('span');
        span.className = 'char-span';
        span.textContent = c;
        el.appendChild(span);
      }
    });
  </script>
</body>
</html>
